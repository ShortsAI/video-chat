<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0d11;--surface:#13161d;--surface2:#1c2029;--border:#252a35;--accent:#00e5a0;--accent2:#0099ff;--danger:#ff4466;--text:#e8eaf0;--muted:#6b7280;--neon-cyan:#00ffff;--neon-orange:#ff6600}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}

/* LOBBY */
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;background:var(--bg);z-index:100;overflow-y:auto;padding:36px 20px 60px;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.lobby-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.22;animation:blobDrift 12s ease-in-out infinite alternate}
.blob-1{width:500px;height:500px;top:-150px;left:-100px;background:#00e5a0}
.blob-2{width:400px;height:400px;bottom:-100px;right:-80px;background:#0099ff;animation-delay:-4s}
.blob-3{width:300px;height:300px;top:40%;left:50%;background:#9933ff;animation-delay:-8s}
@keyframes blobDrift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.08)}}
.lobby-inner{position:relative;z-index:1;width:100%;max-width:1000px}
.top-hud{position:fixed;top:16px;right:20px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.online-badge{display:flex;align-items:center;gap:7px;background:rgba(11,13,17,.9);backdrop-filter:blur(8px);border:1px solid rgba(0,255,200,.4);border-radius:30px;padding:5px 14px 5px 10px;font-family:'DM Mono',monospace;font-size:13px;color:#00ffcc;box-shadow:0 0 12px rgba(0,255,200,.2)}
.online-dot{width:8px;height:8px;border-radius:50%;background:#00ffcc;box-shadow:0 0 6px #00ffcc,0 0 12px #00ffcc;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.local-clock{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);text-align:right;padding-right:4px}
.lobby-hero{text-align:center;margin-bottom:28px;padding-top:8px}
.lobby-logo{display:inline-flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;text-shadow:0 0 12px var(--accent),0 0 28px var(--accent)}
.logo-hex{font-size:24px;filter:drop-shadow(0 0 8px var(--accent))}
.lobby-hero h1{font-size:clamp(28px,4vw,48px);font-weight:800;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#e8eaf0 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lobby-hero p{color:var(--muted);font-size:14px}
.entry-row{display:flex;align-items:stretch;gap:10px;margin:0 auto 28px}
.entry-field{display:flex;align-items:center;gap:10px;flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 14px;transition:box-shadow .2s;min-width:0}
.entry-field:focus-within{box-shadow:0 0 0 2px var(--accent),0 0 18px rgba(0,229,160,.18)}
.entry-field.custom:focus-within{box-shadow:0 0 0 2px var(--accent2),0 0 18px rgba(0,153,255,.18)}
.entry-field label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.lbl-n{color:var(--accent)}.lbl-r{color:var(--accent2)}
.entry-field input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;min-width:0}
.entry-field input::placeholder{color:var(--muted)}
.entry-btn{background:var(--accent2);color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:0 20px;cursor:pointer;white-space:nowrap;transition:opacity .15s,transform .15s;flex-shrink:0}
.entry-btn:hover{opacity:.85;transform:translateY(-1px)}
@media(max-width:600px){.entry-row{flex-direction:column}.entry-btn{padding:12px}}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;text-align:center}
.room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
@media(max-width:680px){.room-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:440px){.room-grid{grid-template-columns:1fr}}
.room-card{--c:#00e5a0;position:relative;border-radius:16px;padding:20px 16px 14px;cursor:pointer;overflow:hidden;background:var(--surface);border:1px solid rgba(255,255,255,.07);transition:transform .2s,box-shadow .2s;animation:cardIn .45s ease both;display:flex;flex-direction:column}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.room-card:nth-child(1){animation-delay:.04s}.room-card:nth-child(2){animation-delay:.08s}.room-card:nth-child(3){animation-delay:.12s}.room-card:nth-child(4){animation-delay:.16s}.room-card:nth-child(5){animation-delay:.20s}.room-card:nth-child(6){animation-delay:.24s}.room-card:nth-child(7){animation-delay:.28s}.room-card:nth-child(8){animation-delay:.32s}.room-card:nth-child(9){animation-delay:.36s}
.room-card::before{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none;background:radial-gradient(circle at 30% 30%, color-mix(in srgb,var(--c) 15%,transparent), transparent 65%)}
.room-card::after{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none;border:1.5px solid var(--c);opacity:.25;transition:opacity .25s}
.room-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 8px 32px color-mix(in srgb,var(--c) 26%,transparent)}
.room-card:hover::after{opacity:.8}.room-card:active{transform:scale(.98)}
.room-emoji{font-size:28px;margin-bottom:7px;display:block;filter:drop-shadow(0 0 5px var(--c));transition:filter .2s}
.room-card:hover .room-emoji{filter:drop-shadow(0 0 12px var(--c))}
.room-name{font-size:15px;font-weight:800;color:var(--text);margin-bottom:3px;transition:color .2s}
.room-card:hover .room-name{color:var(--c)}
.room-desc{font-size:11px;color:var(--muted);line-height:1.4;flex:1}
.room-badge{position:absolute;top:11px;right:11px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;background:color-mix(in srgb,var(--c) 14%,transparent);color:var(--c);border:1px solid color-mix(in srgb,var(--c) 35%,transparent);border-radius:5px;padding:2px 6px}
.room-stats{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.si{display:flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);transition:color .2s}
.room-card:hover .si{color:rgba(255,255,255,.65)}
.si svg{width:11px;height:11px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:0 0 5px var(--c);margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .3s}
.live-dot.on{opacity:1;animation:pulse 2s ease-in-out infinite}
.test-strip{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:13px 16px;margin-bottom:20px;cursor:pointer;transition:box-shadow .2s}
.test-strip:hover{box-shadow:0 0 0 1.5px rgba(255,255,255,.18),0 4px 18px rgba(0,0,0,.3)}
.test-emoji{font-size:22px;flex-shrink:0}.test-info{flex:1;min-width:0}
.test-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}.test-desc{font-size:11px;color:var(--muted)}
.test-stats{display:flex;align-items:center;gap:8px;flex-shrink:0}
.test-join-btn{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:9px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:7px 14px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.test-join-btn:hover{background:var(--border);transform:translateY(-1px)}
.other-sec{margin-top:4px}
.other-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:680px){.other-grid{grid-template-columns:repeat(2,1fr)}}
.other-card{--c:#aaaaff;position:relative;border-radius:13px;padding:14px 14px 12px;cursor:pointer;background:var(--surface);border:1px solid rgba(255,255,255,.06);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;animation:cardIn .4s ease both}
.other-card::after{content:'';position:absolute;inset:0;border-radius:13px;pointer-events:none;border:1px solid var(--c);opacity:.2;transition:opacity .2s}
.other-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px color-mix(in srgb,var(--c) 22%,transparent)}
.other-card:hover::after{opacity:.7}
.other-emoji{font-size:22px;margin-bottom:6px;display:block;filter:drop-shadow(0 0 4px var(--c))}
.other-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.other-card:hover .other-name{color:var(--c)}
.other-stats-row{display:flex;align-items:center;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.05)}
.osi{display:flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.4)}
.osi svg{width:10px;height:10px}

/* APP */
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}
.app-hdr{display:flex;align-items:center;gap:12px;padding:0 14px;height:50px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.app-logo{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);text-shadow:0 0 10px var(--accent)}
.room-tag{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;color:var(--muted)}
.hdr-space{flex:1}
.hdr-hud{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hdr-online{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:11px;color:#00ffcc}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:#00ffcc;box-shadow:0 0 6px #00ffcc;animation:pulse 2s ease-in-out infinite}
.hdr-clock{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.35)}

/* Video toolbar */
.vid-toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.vt{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.03em}
.vt:hover{background:var(--border);border-color:var(--accent);color:var(--accent)}
.vt.on{background:rgba(0,229,160,.15);border-color:var(--accent);color:var(--accent)}
.vt.red{border-color:var(--danger);color:var(--danger)}
.vt.red:hover{background:rgba(255,68,102,.15)}
.vt svg{width:13px;height:13px;flex-shrink:0}
.vt-sep{width:1px;height:20px;background:var(--border);margin:0 2px}

/* Main layout */
.main-layout{display:flex;flex:1;overflow:hidden}
.video-wrap{flex:1;background:#000;position:relative;overflow:hidden}
#jaas-container{width:100%;height:100%}
#draw-canvas{position:absolute;inset:0;width:100%;height:100%;display:none;z-index:20;touch-action:none}
#draw-canvas.on{display:block;cursor:crosshair}
.draw-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:30;display:none;align-items:center;gap:7px;background:rgba(11,13,17,.93);border:1px solid var(--border);border-radius:12px;padding:8px 12px;backdrop-filter:blur(8px);white-space:nowrap}
.draw-bar.on{display:flex}
.dc-btn{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.dc-btn.sel{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.5)}
.dc-size{width:65px;accent-color:var(--accent)}
.db-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;transition:all .15s}
.db-btn:hover{background:var(--border)}
.db-post{background:var(--accent);color:#000;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:4px 12px;cursor:pointer;transition:opacity .15s}
.db-post:hover{opacity:.85}
.draw-color-preview{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.3);flex-shrink:0}

/* Chat panel */
.chat-panel{width:340px;min-width:260px;max-width:55%;border-left:1px solid rgba(0,255,157,.28);display:flex;flex-direction:column;background:linear-gradient(180deg,#0f121a,#0a0d14);box-shadow:inset 0 0 28px rgba(0,255,157,.07);position:relative;overflow:hidden}
.resize-handle{position:absolute;left:0;top:0;width:6px;height:100%;background:transparent;cursor:col-resize;z-index:10;transition:background .2s}
.resize-handle:hover{background:rgba(0,255,157,.38)}
.chat-hdr{padding:12px 14px;border-bottom:1px solid rgba(0,255,157,.28);background:rgba(0,0,0,.4);font-weight:800;letter-spacing:.15em;color:var(--accent);text-shadow:0 0 10px var(--accent);position:relative;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon-orange),transparent);box-shadow:0 0 14px var(--neon-orange)}
#chat-msgs{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;background:rgba(5,7,13,.6)}
#chat-msgs::-webkit-scrollbar{width:4px}
#chat-msgs::-webkit-scrollbar-track{background:transparent}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--neon-cyan);border-radius:10px}
.msg{max-width:86%;padding:10px 14px;border-radius:16px;animation:msgIn .4s ease-out}
.msg.me{align-self:flex-end;background:linear-gradient(135deg,#00aaff88,#ff00aa66);border:1px solid #00aaff;color:#fff;box-shadow:0 0 8px #00aaff,0 0 14px #00aaff55}
.msg.them{align-self:flex-start;background:linear-gradient(135deg,#00ff9d88,#ffaa0066);border:1px solid #00ff9d;color:#fff;box-shadow:0 0 8px #00ff9d,0 0 14px #00ff9d55}
.msg.draw-msg{align-self:center;max-width:95%}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.msg-name{font-size:12px;font-weight:700;text-shadow:0 0 5px currentColor}
.msg-time{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.65)}
.msg-text{font-size:14px;line-height:1.5;word-break:break-word}
.msg-img{max-width:100%;border-radius:8px;margin-top:6px;display:block;cursor:zoom-in;border:1px solid rgba(255,255,255,.15);transition:opacity .15s}
.msg-img:hover{opacity:.85}
.sys-msg{align-self:center;max-width:92%;text-align:center;font-size:11px;color:#ff8800;font-style:italic;background:rgba(255,102,0,.1);padding:8px 12px;border-radius:10px;margin:6px 0;animation:glow 3s infinite alternate}
@keyframes msgIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes glow{from{box-shadow:0 0 10px rgba(255,102,0,.2)}to{box-shadow:0 0 24px rgba(255,102,0,.6)}}

/* Emoji picker */
.emoji-panel{display:none;flex-direction:column;flex-shrink:0;border-top:1px solid rgba(0,255,157,.2);background:rgba(8,12,20,.97);max-height:200px}
.emoji-panel.open{display:flex}
.emoji-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto;flex-shrink:0}
.etab{flex-shrink:0;padding:6px 11px;font-size:14px;cursor:pointer;opacity:.5;transition:opacity .2s;border-bottom:2px solid transparent}
.etab.on{opacity:1;border-bottom-color:var(--accent)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;padding:7px;overflow-y:auto;flex:1}
.ei{font-size:20px;padding:3px 4px;cursor:pointer;border-radius:5px;transition:background .15s;line-height:1}
.ei:hover{background:rgba(255,255,255,.1)}
.float-row{display:flex;align-items:center;gap:4px;padding:6px 8px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3);flex-shrink:0;flex-wrap:wrap}
.float-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;margin-right:2px}
.fb{font-size:15px;padding:3px 5px;cursor:pointer;border-radius:5px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);transition:all .15s}
.fb:hover{background:rgba(255,255,255,.14);border-color:var(--accent)}
.party-btn{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border-radius:7px;border:1px solid var(--neon-orange);background:rgba(255,102,0,.15);color:var(--neon-orange);transition:all .15s;margin-left:auto}
.party-btn:hover{background:rgba(255,102,0,.3)}

/* Chat input */
.chat-input-row{padding:8px;border-top:1px solid rgba(0,255,157,.28);display:flex;gap:6px;background:rgba(0,0,0,.38);flex-shrink:0;align-items:center}
#chat-in{flex:1;background:rgba(10,15,25,.7);border:1px solid #00ff9d33;border-radius:10px;color:#fff;font-size:13px;padding:9px 12px;outline:none;transition:all .2s}
#chat-in:focus{border-color:var(--neon-orange);box-shadow:inset 0 0 8px var(--neon-orange),0 0 14px var(--neon-orange)}
.send-btn{background:linear-gradient(135deg,#ff6600,#ff8800);border:none;border-radius:10px;color:#fff;font-size:16px;width:38px;height:38px;cursor:pointer;box-shadow:0 0 10px #ff6600;transition:transform .15s;flex-shrink:0}
.send-btn:hover{transform:scale(1.08)}
.emoji-tog{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;font-size:16px;width:34px;height:34px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.emoji-tog:hover{background:rgba(255,255,255,.14)}
.emoji-tog.on{background:rgba(0,229,160,.15);border-color:var(--accent)}

/* Users */
.users-area{border-top:1px solid var(--border);padding:8px 12px 0;flex-shrink:0}
.users-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.users-list{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:8px}
.upill{font-size:11px;background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.35);border-radius:18px;padding:3px 10px;color:#fff;box-shadow:0 0 8px rgba(0,255,157,.25)}
.upill.me{background:rgba(255,102,0,.22);border-color:var(--neon-orange);box-shadow:0 0 12px var(--neon-orange)}

/* Float + Party overlays */
#float-layer{position:fixed;inset:0;pointer-events:none;z-index:9000;overflow:hidden}
.fe{position:absolute;bottom:-60px;animation:floatUp linear forwards;user-select:none;pointer-events:none}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-110vh) rotate(360deg);opacity:0}}
#party-layer{position:fixed;inset:0;pointer-events:none;z-index:8999;overflow:hidden;display:none}
.laser{position:absolute;width:3px;border-radius:3px;transform-origin:bottom center;animation:laserSweep linear infinite}
@keyframes laserSweep{0%{transform:rotate(-60deg);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:rotate(60deg);opacity:0}}
.nshape{position:absolute;animation:shapeUp linear forwards;pointer-events:none}

<body>

<div id="float-layer"></div>
<div id="party-layer"></div>

</div>

<!-- APP -->
<div id="app">
  <header class="app-hdr">
    <span class="app-logo">⬡ PeerRoom</span>
    <div class="room-tag" id="room-display"></div>
    <div class="hdr-space"></div>
    <div class="hdr-hud">

      <div class="hdr-clock" id="clk-app"></div>
    </div>
  </header>
  <!-- Video controls -->
  <div class="vid-toolbar">
    <button class="vt on" id="vt-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>Grid</button>
    <button class="vt" id="vt-focus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="15" height="13" rx="2"/><rect x="19" y="5" width="3" height="4" rx="1"/><rect x="19" y="11" width="3" height="4" rx="1"/></svg>Focus</button>
    <div class="vt-sep"></div>
    <button class="vt" id="vt-draw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"/></svg>Draw</button>
    <div class="draw-color-preview" id="draw-preview" style="background:#00ff9d"></div>
    <div class="vt-sep"></div>
    <button class="vt" id="vt-fs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>Fullscreen</button>
    <div class="vt-sep"></div>
    <button class="vt red" id="vt-leave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Leave</button>
  </div>
  <div class="main-layout">
    <!-- Video -->
    <div class="video-wrap" id="video-wrap">

        <div class="dc-btn" style="background:#ff6600" data-col="#ff6600"></div>

    <!-- Chat -->
    <div class="chat-panel" id="chat-panel">

  </div>
</div>

<!-- SETTINGS -->
<div id="settings-modal">
  <div style="background:var(--surface);padding:24px;border-radius:16px;width:320px;max-width:90%">
    <h3 style="margin-bottom:16px;color:var(--accent)">Chat Settings</h3>

    <input id="col-pick" type="color" style="width:100%;margin:8px 0;height:40px"/>
    <label style="display:block;margin:12px 0 4px">Font</label>

    <div style="margin-top:20px;display:flex;gap:10px">
      <button id="save-set-btn" style="flex:1;background:var(--accent);color:#000;padding:10px;border:none;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700">Save</button>
      <button id="close-set-btn" style="flex:1;background:var(--surface2);padding:10px;border:none;border-radius:8px;cursor:pointer;color:var(--text)">Cancel</button>
    </div>
  </div>
</div>

<script>
(function(){
/* ── Icons ── */
var IC={
  person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>',
  cam:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>',
  scr:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'
};
function sh(u,c,s){return'<span class="si">'+IC.person+'<span>'+u+'</span></span><span class="si">'+IC.cam+'<span>'+c+'</span></span><span class="si">'+IC.scr+'<span>'+s+'</span></span>';}
function osh(u,c,s){return'<span class="osi">'+IC.person+'<span>'+u+'</span></span><span class="osi">'+IC.cam+'<span>'+c+'</span></span><span class="osi">'+IC.scr+'<span>'+s+'</span></span>';}

/* ── Emoji data ── */
var EC={
  '😀':['😀','😂','🤣','😍','🥰','😎','🤩','🥳','😜','🤪','😏','🤔','😮','😱','🥺','😭','😤','🤬','💀','🤖','👾','🎭','🫠','🥹','😇','🤗'],
  '👋':['👋','🤝','👍','👎','👏','🙌','🤜','🤛','✌️','🤞','👀','💪','🧠','💅','🦶','🫀','👃','🦷','🫁','👁'],
  '🎮':['🎮','🕹','🎲','🃏','🎯','🏆','🥇','🎪','🎠','🎡','🎢','🎭','🎬','🎤','🎸','🥁','🎹','🎻','🪗','🎺','🎳','🎰'],
  '🌿':['🌿','🔥','💧','⚡','❄️','🌊','🌸','🌺','🌻','🌙','⭐','🌈','☄️','🌋','🦋','🐉','🦄','🐺','🦊','🌵','🍄','🌴'],
  '🚀':['🚀','🛸','🌍','🌑','⭐','💫','✨','🌟','🔮','💎','⚡','🔭','🛰','🌌','🪐','☄️','👽','🤖','⚔️','🛡'],
  '❤️':['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💕','💞','💓','💗','💖','💘','💝','💟','♥️','💔','🫶']
};
var ALL_EM=[];Object.values(EC).forEach(function(a){ALL_EM=ALL_EM.concat(a);});

/* ── Presets ── */
var PR=[
  {id:'stoners',name:'Stoners',emoji:'🌿',desc:'Chill vibes only',color:'#39d353'},
  {id:'gamers',name:'Gamers',emoji:'🎮',desc:"Let's play something",color:'#00aaff'},
  {id:'livestreamers',name:'Livestreamers',emoji:'📡',desc:'Live & on the air',color:'#ff4466'},
  {id:'movies',name:'Movies',emoji:'🎬',desc:'Film buffs unite',color:'#ffcc00'},
  {id:'music',name:'Music',emoji:'🎵',desc:'Beats, drops & bangers',color:'#cc44ff'},
  {id:'sports',name:'Sports',emoji:'⚽',desc:'Game day, every day',color:'#ff6600'},
  {id:'tech-talk',name:'Tech Talk',emoji:'💻',desc:'Devs, builders & nerds',color:'#00e5ff'},
  {id:'night-owls',name:'Night Owls',emoji:'🦉',desc:'Up late, no rules',color:'#7b61ff'},
  {id:'random',name:'Random',emoji:'🎲',desc:'Anything goes in here',color:'#ff3399'}
];
var PID=PR.map(function(r){return r.id;});
var RE=['🚀','🌊','🔥','💎','🎯','🌙','⚡','🦋','🎪','🌈','🎭','🦄','🌺','🎸','🤖','👾','🎲','💫','🔮','🌴','🧩','🪐','🦊','🐉','🌋'];
var RC=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9a3c','#00b4d8','#f72585','#4cc9f0','#7bf1a8','#ffbe0b','#fb5607','#8338ec','#3a86ff','#06d6a0'];
function rE(){return RE[Math.floor(Math.random()*RE.length)];}
function rC(){return RC[Math.floor(Math.random()*RC.length)];}

/* ── State ── */
var myName='',myRoom='',myUID='',jaasAPI=null;
var US=JSON.parse(localStorage.getItem('pr_settings')||'null')||{nameColor:'#00ff9d',font:"'Syne',sans-serif",bold:false,randColor:true,sounds:true};
var slots=[];
var PST={};PR.forEach(function(r){PST[r.id]={p:r,u:0,c:0,s:0};});
var partyOn=false,partyTmr=[];

/* ── Audio ── */
var AC=null;
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}
function bloop(self){
  if(!US.sounds)return;var ctx=getAC();if(!ctx)return;
  try{var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
  o.type='sine';o.frequency.setValueAtTime(self?880:660,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(self?440:330,ctx.currentTime+0.12);
  g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(0.15,ctx.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
  o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);}catch(e){}
}

/* ── Clock ── */
function tick(){var t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});['clk-lobby','clk-app'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=t;});}
setInterval(tick,1000);tick();

/* ── Grid ── */
function buildGrid(){
  var g=document.getElementById('room-grid');
  for(var i=0;i<9;i++){var c=document.createElement('div');c.className='room-card';g.appendChild(c);slots.push(c);}
  renderGrid();
  document.getElementById('test-strip').addEventListener('click',function(){go('test');});
}
function renderGrid(){
  var sorted=PR.map(function(r){return PST[r.id];}).slice().sort(function(a,b){return b.u-a.u;});
  for(var i=0;i<9&&i<sorted.length;i++){
    var d=sorted[i],r=d.p,card=slots[i];
    card.style.setProperty('--c',r.color);
    card.innerHTML='<span class="room-badge">#'+r.id+'</span><span class="room-emoji">'+r.emoji+'</span><div class="room-name">'+r.name+'</div><div class="room-desc">'+r.desc+'</div><div class="room-stats">'+sh(d.u,d.c,d.s)+'<div class="live-dot'+(d.u>0?' on':'')+'"></div></div>';
    (function(rid){card.onclick=function(){go(rid);};})(r.id);
  }
}

/* ── Firebase subscriptions ── */
function subscribeFB(){
  function setup(){
    var fb=window._fb;
    PID.concat(['test']).forEach(function(rid){
      fb.onValue(fb.ref(fb.db,'rooms/'+rid+'/users'),function(snap){
        var ud=snap.val()||{},u=0,c=0,s=0;
        Object.keys(ud).forEach(function(k){u++;if(ud[k].hasCamera===true)c++;if(ud[k].hasScreen===true)s++;});
        if(rid==='test'){var el=document.getElementById('test-stats');if(el)el.innerHTML=sh(u,c,s);}
        else{PST[rid].u=u;PST[rid].c=c;PST[rid].s=s;renderGrid();}
      });
    });
    fb.onValue(fb.ref(fb.db,'presence'),function(snap){
      var n=snap.val()?Object.keys(snap.val()).length:0;
      document.getElementById('total-count').textContent=n;
      var a=document.getElementById('hdr-count');if(a)a.textContent=n;
    });
    fb.onValue(fb.ref(fb.db,'rooms'),function(snap){
      var all=snap.val()||{},others=[];
      Object.keys(all).forEach(function(rid){
        if(PID.indexOf(rid)!==-1||rid==='test')return;
        var ud=all[rid].users||{},u=Object.keys(ud).length;if(u===0)return;
        var c=0,s=0;Object.keys(ud).forEach(function(k){if(ud[k].hasCamera===true)c++;if(ud[k].hasScreen===true)s++;});
        var meta=all[rid].meta||{};
        others.push({id:rid,emoji:meta.emoji||'🚪',color:meta.color||'#aaaaff',u:u,c:c,s:s});
      });
      others.sort(function(a,b){return b.u-a.u;});
      renderOthers(others);
    });
    /* Float events */
    fb.onChildAdded(fb.ref(fb.db,'floats'),function(snap){var d=snap.val()||{};spawnFloat(d.emoji||'🔥',false);});
    /* Party events */
    fb.onChildAdded(fb.ref(fb.db,'party'),function(snap){var d=snap.val()||{};if(d.on)startParty();else stopParty();});
  }
  if(window._fb)setup();else window.addEventListener('firebase-ready',setup,{once:true});
}

function renderOthers(list){
  var sec=document.getElementById('other-sec'),grid=document.getElementById('other-grid');
  if(!list.length){sec.style.display='none';return;}
  sec.style.display='block';grid.innerHTML='';
  list.forEach(function(r){
    var card=document.createElement('div');card.className='other-card';card.style.setProperty('--c',r.color);
    card.innerHTML='<span class="other-emoji">'+r.emoji+'</span><div class="other-name">#'+esc(r.id)+'</div><div class="other-stats-row">'+osh(r.u,r.c,r.s)+'</div>';
    (function(rid){card.addEventListener('click',function(){go(rid);});})(r.id);
    grid.appendChild(card);
  });
}

/* ── Enter room ── */
function requireName(){
  var n=document.getElementById('name-in').value.trim();
  if(!n){var f=document.querySelector('.entry-field');f.style.boxShadow='0 0 0 2px #ff4466, 0 0 18px rgba(255,68,102,.3)';document.getElementById('name-in').focus();setTimeout(function(){f.style.boxShadow='';},1800);return null;}
  return n;
}
function go(roomId){
  var name=requireName();if(!name)return;
  myName=name;myRoom=roomId;myUID='u'+Date.now()+Math.random().toString(36).substring(2,8);
  document.getElementById('room-display').textContent='# '+roomId;
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').classList.add('visible');

  function doFB(){
    var fb=window._fb;
    var col=US.randColor?'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'):US.nameColor;
    var uRef=fb.ref(fb.db,'rooms/'+roomId+'/users/'+myUID);
    fb.set(uRef,{name:myName,joined:Date.now(),color:col,hasCamera:false,hasScreen:false});
    fb.onDisconnect(uRef).remove();
    if(PID.indexOf(roomId)===-1&&roomId!=='test'){
      var mRef=fb.ref(fb.db,'rooms/'+roomId+'/meta');
      fb.get(mRef).then(function(s){if(!s.val())fb.set(mRef,{emoji:rE(),color:rC()});}).catch(function(){fb.set(fb.ref(fb.db,'rooms/'+roomId+'/meta'),{emoji:rE(),color:rC()});});
    }
    var pRef=fb.ref(fb.db,'presence/'+myUID);
    fb.set(pRef,{name:myName,room:roomId,ts:Date.now()});fb.onDisconnect(pRef).remove();
    fb.onValue(fb.ref(fb.db,'rooms/'+roomId+'/users'),function(s){buildUserList(s.val()||{});});
    fb.onChildAdded(fb.ref(fb.db,'rooms/'+roomId+'/chat'),function(s){
      var msg=s.val()||{};renderMsg(msg,msg.userId===myUID);
    });
    window._myRoom=roomId;window._myUID=myUID;
  }
  if(window._fb)doFB();else window.addEventListener('firebase-ready',doFB,{once:true});

  function startVideo(){
    try{
      jaasAPI=new JitsiMeetExternalAPI('8x8.vc',{
        roomName:'vpaas-magic-cookie-2ad209272b64436e963d9c99c03231c2/'+roomId,
        parentNode:document.getElementById('jaas-container'),
        width:'100%',height:'100%',
        configOverwrite:{startWithAudioMuted:false,startWithVideoMuted:false,disableDeepLinking:true,prejoinPageEnabled:false,disableChat:true,startWithTileView:true,toolbarButtons:['microphone','camera','desktop','raisehand'],hideConferenceTimer:true,hideConferenceSubject:true},
        interfaceConfigOverwrite:{SHOW_BRAND_WATERMARK:false,SHOW_WATERMARK_FOR_GUESTS:false,SHOW_JITSI_WATERMARK:false,APP_NAME:'PeerRoom',DEFAULT_BACKGROUND:'#0b0d11',DISABLE_DOMINANT_SPEAKER_INDICATOR:true,TOOLBAR_TIMEOUT:4000,TOOLBAR_ALWAYS_VISIBLE:false},
        userInfo:{displayName:name}
      });
      jaasAPI.addEventListeners({
        videoConferenceJoined:function(){setMyState('hasCamera',true);},
        videoMuteStatusChanged:function(e){setMyState('hasCamera',!e.muted);},
        screenSharingStatusChanged:function(e){setMyState('hasScreen',!!e.on);},
        videoConferenceLeft:function(){setMyState('hasCamera',false);setMyState('hasScreen',false);}
      });
      sysMsg('Video room connected — allow camera/mic when prompted');
    }catch(e){sysMsg('Video connection failed: '+(e.message||'Unknown error'));}
  }
  if(typeof JitsiMeetExternalAPI!=='undefined')startVideo();
  else{var chk=setInterval(function(){if(typeof JitsiMeetExternalAPI!=='undefined'){clearInterval(chk);startVideo();}},200);}
}

function setMyState(field,val){
  if(!window._fb||!window._myRoom||!window._myUID)return;
  var fb=window._fb;fb.set(fb.ref(fb.db,'rooms/'+window._myRoom+'/users/'+window._myUID+'/'+field),val);
}

/* ── Video toolbar ── */
function initVidToolbar(){
  document.getElementById('vt-tile').addEventListener('click',function(){
    if(jaasAPI)jaasAPI.executeCommand('setTileView',true);
    document.getElementById('vt-tile').classList.add('on');document.getElementById('vt-focus').classList.remove('on');
  });
  document.getElementById('vt-focus').addEventListener('click',function(){
    if(jaasAPI)jaasAPI.executeCommand('setTileView',false);
    document.getElementById('vt-focus').classList.add('on');document.getElementById('vt-tile').classList.remove('on');
  });
  document.getElementById('vt-fs').addEventListener('click',function(){
    var va=document.getElementById('video-wrap');
    if(!document.fullscreenElement){(va.requestFullscreen||va.webkitRequestFullscreen).call(va);}
    else{(document.exitFullscreen||document.webkitExitFullscreen).call(document);}
  });
  document.getElementById('vt-leave').addEventListener('click',function(){if(jaasAPI)jaasAPI.dispose();location.reload();});
}

/* ── Draw ── */
var drawOn=false,drawing=false,drawCol='#00ff9d',drawSz=4;
function initDraw(){
  var canvas=document.getElementById('draw-canvas');
  var bar=document.getElementById('draw-bar');
  var ctx=canvas.getContext('2d');
  function resize(){var v=document.getElementById('video-wrap');canvas.width=v.offsetWidth;canvas.height=v.offsetHeight;}
  window.addEventListener('resize',resize);resize();

  document.getElementById('vt-draw').addEventListener('click',function(){
    drawOn=!drawOn;
    canvas.classList.toggle('on',drawOn);bar.classList.toggle('on',drawOn);
    document.getElementById('vt-draw').classList.toggle('on',drawOn);
  });
  document.querySelectorAll('.dc-btn').forEach(function(b){
    b.addEventListener('click',function(){
      drawCol=b.dataset.col;
      document.querySelectorAll('.dc-btn').forEach(function(x){x.classList.remove('sel');});b.classList.add('sel');
      document.getElementById('draw-preview').style.background=drawCol;
    });
  });
  document.getElementById('draw-size').addEventListener('input',function(){drawSz=parseInt(this.value);});
  document.getElementById('draw-clear').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width,canvas.height);});

  function pos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}
  canvas.addEventListener('mousedown',function(e){if(!drawOn)return;drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',function(e){
    if(!drawing||!drawOn)return;var p=pos(e);
    ctx.lineTo(p.x,p.y);ctx.strokeStyle=drawCol;ctx.lineWidth=drawSz;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  });
  canvas.addEventListener('mouseup',function(){drawing=false;});
  canvas.addEventListener('mouseleave',function(){drawing=false;});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();if(!drawOn)return;drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing||!drawOn)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle=drawCol;ctx.lineWidth=drawSz;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',function(){drawing=false;});

  document.getElementById('draw-post').addEventListener('click',function(){
    if(!window._fb||!myRoom)return;
    var dataURL=canvas.toDataURL('image/png');
    window._fb.push(window._fb.ref(window._fb.db,'rooms/'+myRoom+'/chat'),{
      userId:myUID,name:myName,text:'🎨 Drawing',time:Date.now(),color:US.nameColor,isDraw:true,imgUrl:dataURL
    });
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawOn=false;canvas.classList.remove('on');bar.classList.remove('on');
    document.getElementById('vt-draw').classList.remove('on');
  });
}

/* ── Emoji picker ── */
function initEmoji(){
  var panel=document.getElementById('emoji-panel'),tabs=document.getElementById('emoji-tabs'),grid=document.getElementById('emoji-grid'),tog=document.getElementById('emoji-tog');
  var cats=Object.keys(EC),activeCat=cats[0];
  cats.forEach(function(cat){
    var t=document.createElement('div');t.className='etab'+(cat===activeCat?' on':'');t.textContent=cat.split(' ')[0];t.title=cat;
    t.addEventListener('click',function(){activeCat=cat;document.querySelectorAll('.etab').forEach(function(x){x.classList.remove('on');});t.classList.add('on');renderEG();});
    tabs.appendChild(t);
  });
  function renderEG(){
    grid.innerHTML='';
    EC[activeCat].forEach(function(em){
      var s=document.createElement('span');s.className='ei';s.textContent=em;
      s.addEventListener('click',function(){var inp=document.getElementById('chat-in');inp.value+=em;inp.focus();});
      grid.appendChild(s);
    });
  }
  renderEG();
  tog.addEventListener('click',function(){panel.classList.toggle('open');tog.classList.toggle('on',panel.classList.contains('open'));});

  document.querySelectorAll('.fb').forEach(function(b){
    b.addEventListener('click',function(){
      var em=b.dataset.em;spawnFloat(em,true);
      if(window._fb&&myRoom)window._fb.push(window._fb.ref(window._fb.db,'floats'),{emoji:em,room:myRoom,ts:Date.now()});
    });
  });
  document.getElementById('party-btn').addEventListener('click',function(){
    var now=!partyOn;
    if(window._fb&&myRoom)window._fb.push(window._fb.ref(window._fb.db,'party'),{on:now,room:myRoom,ts:Date.now()});
    if(now)startParty();else stopParty();
  });
}

/* ── Float emojis ── */
var NC=['#ff0066','#00ffcc','#ff6600','#00aaff','#cc00ff','#ffff00','#ff3399','#00ff88'];
function spawnFloat(em,burst){
  var lay=document.getElementById('float-layer'),n=burst?10:1;
  for(var i=0;i<n;i++){(function(){
    var el=document.createElement('span');el.className='fe';el.textContent=em;
    var x=5+Math.random()*90,dur=2.5+Math.random()*2.2,sz=20+Math.floor(Math.random()*20);
    el.style.cssText='left:'+x+'%;font-size:'+sz+'px;animation-duration:'+dur+'s;animation-delay:'+(Math.random()*0.7)+'s';
    lay.appendChild(el);setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},dur*1000+900);
  })();}
}

/* ── Party mode ── */
function startParty(){
  partyOn=true;document.getElementById('party-btn').textContent='⛔ Stop Party';
  var lay=document.getElementById('party-layer');lay.style.display='block';
  function mkLaser(){
    var el=document.createElement('div');el.className='laser';
    var col=NC[Math.floor(Math.random()*NC.length)];
    var dur=0.8+Math.random()*1.2;
    el.style.cssText='left:'+(Math.random()*100)+'%;bottom:0;height:'+(40+Math.random()*50)+'vh;background:'+col+';box-shadow:0 0 8px '+col+',0 0 18px '+col+';animation-duration:'+dur+'s';
    lay.appendChild(el);setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},dur*1000+200);
  }
  function mkShape(){
    var el=document.createElement('div');el.className='nshape';
    var col=NC[Math.floor(Math.random()*NC.length)];
    var sz=8+Math.random()*26,dur=2+Math.random()*2.5;
    var br=['50%','4px','0','30%'][Math.floor(Math.random()*4)];
    el.style.cssText='left:'+(Math.random()*100)+'%;bottom:0;width:'+sz+'px;height:'+sz+'px;background:'+col+';border-radius:'+br+';box-shadow:0 0 10px '+col+',0 0 20px '+col+';animation-duration:'+dur+'s';
    lay.appendChild(el);setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},dur*1000+300);
  }
  partyTmr.push(setInterval(mkLaser,110));partyTmr.push(setInterval(mkShape,160));
}
function stopParty(){
  partyOn=false;document.getElementById('party-btn').textContent='🎛 Party Mode';
  partyTmr.forEach(clearInterval);partyTmr=[];
  setTimeout(function(){var l=document.getElementById('party-layer');l.style.display='none';l.innerHTML='';},600);
}

/* ── Chat rendering ── */
var firstLoad=true;setTimeout(function(){firstLoad=false;},3500);
var IMG_RE=/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?\S*)?$/i;
function renderMsg(msg,isSelf){
  var c=document.getElementById('chat-msgs');
  var t=new Date(msg.time||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var div=document.createElement('div');
  var cls='msg '+(isSelf?'me':'them');

  if(msg.isDraw&&msg.imgUrl){
    div.className=cls+' draw-msg';
    div.innerHTML='<div class="msg-meta"><span class="msg-name" style="color:'+esc(msg.color||'#fff')+'">'+esc(msg.name||'?')+'</span><span class="msg-time">'+t+'</span></div><div class="msg-text" style="font-size:11px;opacity:.7;margin-bottom:4px">🎨 Drawing shared</div><img class="msg-img" src="'+esc(msg.imgUrl)+'" alt="drawing" loading="lazy"/>';
  } else if(msg.isImage||IMG_RE.test((msg.text||'').trim())){
    div.className=cls;
    div.innerHTML='<div class="msg-meta"><span class="msg-name" style="color:'+esc(msg.color||'#fff')+'">'+esc(msg.name||'?')+'</span><span class="msg-time">'+t+'</span></div><img class="msg-img" src="'+esc((msg.text||'').trim())+'" alt="image" loading="lazy"/>';
  } else {
    div.className=cls;
    div.innerHTML='<div class="msg-meta"><span class="msg-name" style="color:'+esc(msg.color||'#fff')+'">'+esc(msg.name||'?')+'</span><span class="msg-time">'+t+'</span></div><div class="msg-text">'+esc(msg.text||'')+'</div>';
  }

  div.querySelectorAll('.msg-img').forEach(function(img){
    img.addEventListener('click',function(){document.getElementById('lb-img').src=img.src;document.getElementById('lightbox').classList.add('open');});
    img.addEventListener('error',function(){img.style.display='none';});
  });
  c.appendChild(div);c.scrollTop=c.scrollHeight;
  if(!firstLoad)bloop(isSelf);
}

function sysMsg(txt){var c=document.getElementById('chat-msgs'),d=document.createElement('div');d.className='sys-msg';d.textContent=txt;c.appendChild(d);c.scrollTop=c.scrollHeight;}

function sendChat(){
  var inp=document.getElementById('chat-in'),txt=inp.value.trim();
  if(!txt||!window._fb)return;
  firstLoad=false;
  var isImg=IMG_RE.test(txt);
  window._fb.push(window._fb.ref(window._fb.db,'rooms/'+myRoom+'/chat'),{userId:myUID,name:myName,text:txt,time:Date.now(),color:US.nameColor,isImage:isImg});
  inp.value='';
}

/* ── User list ── */
function buildUserList(ud){
  var list=document.getElementById('users-list');list.innerHTML='';
  Object.keys(ud).forEach(function(k){
    var u=ud[k],p=document.createElement('div');
    p.className='upill'+(u.name===myName?' me':'');p.style.color=u.color||'#fff';p.textContent=u.name;
    list.appendChild(p);
  });
}

/* ── Resize ── */
function initResize(){
  var h=document.getElementById('resize-handle'),panel=document.getElementById('chat-panel');
  var drag=false,sx=0,sw=0;
  h.addEventListener('mousedown',function(e){drag=true;sx=e.clientX;sw=panel.offsetWidth;document.body.style.cursor='col-resize';document.body.style.userSelect='none';e.preventDefault();});
  document.addEventListener('mousemove',function(e){if(!drag)return;panel.style.width=Math.max(260,Math.min(700,sw+(sx-e.clientX)))+'px';});
  document.addEventListener('mouseup',function(){if(!drag)return;drag=false;document.body.style.cursor='';document.body.style.userSelect='';});
}

/* ── Settings ── */
function openSettings(){
  document.getElementById('col-pick').value=US.nameColor;
  document.getElementById('font-sel').value=US.font;
  document.getElementById('bold-chk').checked=US.bold;
  document.getElementById('rand-chk').checked=US.randColor;
  document.getElementById('snd-chk').checked=(US.sounds!==false);
  document.getElementById('settings-modal').style.display='flex';
}
function saveSettings(){
  US.nameColor=document.getElementById('col-pick').value;
  US.font=document.getElementById('font-sel').value;
  US.bold=document.getElementById('bold-chk').checked;
  US.randColor=document.getElementById('rand-chk').checked;
  US.sounds=document.getElementById('snd-chk').checked;
  localStorage.setItem('pr_settings',JSON.stringify(US));
  document.getElementById('settings-modal').style.display='none';
  sysMsg('Settings saved!');
}

/* ── Escape ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Init ── */
document.addEventListener('DOMContentLoaded',function(){
  buildGrid();initResize();subscribeFB();initVidToolbar();initDraw();initEmoji();
  document.getElementById('join-btn').addEventListener('click',function(){go(document.getElementById('room-in').value.trim().replace(/\s+/g,'-').toLowerCase()||'general');});
  document.getElementById('room-in').addEventListener('keydown',function(e){if(e.key==='Enter')go(this.value.trim().replace(/\s+/g,'-').toLowerCase()||'general');});
  document.getElementById('name-in').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('room-in').focus();});
  document.getElementById('send-btn').addEventListener('click',sendChat);
  document.getElementById('chat-in').addEventListener('keydown',function(e){if(e.key==='Enter')sendChat();});
  document.getElementById('settings-btn').addEventListener('click',openSettings);
  document.getElementById('save-set-btn').addEventListener('click',saveSettings);
  document.getElementById('close-set-btn').addEventListener('click',function(){document.getElementById('settings-modal').style.display='none';});
  document.addEventListener('click',function(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},{once:true});
  var hash=location.hash.replace('#','').trim();if(hash)document.getElementById('room-in').value=hash;
  document.getElementById('name-in').focus();
});
})();
</script>
