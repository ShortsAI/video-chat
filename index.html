<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeerRoom — Instant Video Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0d11;
      --surface:   #13161d;
      --surface2:  #1c2029;
      --border:    #252a35;
      --accent:    #00e5a0;
      --accent2:   #0099ff;
      --danger:    #ff4466;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    #lobby {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
    }

    .lobby-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 460px;
      max-width: 95vw;
      position: relative;
      overflow: hidden;
    }

    .lobby-card::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,229,160,.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .lobby-card::after {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(0,153,255,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .lobby-card h1 {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .lobby-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn-join {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: transform .15s, opacity .15s;
      margin-top: 4px;
    }
    .btn-join:hover { opacity: .88; transform: translateY(-1px); }

    #app {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    #app.visible { display: flex; }

    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .app-header .logo { margin: 0; font-size: 12px; }
    .room-tag {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      color: var(--muted);
    }
    .header-spacer { flex: 1; }
    .user-count {
      font-size: 12px;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .video-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    #video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
      padding: 14px;
      overflow-y: auto;
      align-content: start;
    }

    .video-tile {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 16/9;
      animation: tileIn .3s ease;
    }

    @keyframes tileIn {
      from { opacity: 0; transform: scale(.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .video-tile video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-tile .tile-label {
      position: absolute;
      bottom: 10px; left: 12px;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .video-tile.local { border-color: var(--accent); }
    .video-tile.local .tile-label::after { content: ' (you)'; color: var(--accent); }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .ctrl-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .15s;
    }
    .ctrl-btn:hover { background: var(--border); transform: scale(1.08); }
    .ctrl-btn.off { background: rgba(255,68,102,.15); border-color: var(--danger); color: var(--danger); }
    .ctrl-btn.leave { background: var(--danger); border-color: var(--danger); color: #fff; }

    .chat-panel {
      width: 300px;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      flex-shrink: 0;
    }

    .chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .msg {
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .msg .msg-meta {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 3px;
    }
    .msg .msg-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--accent);
    }
    .msg.self .msg-name { color: var(--accent2); }

    .msg .msg-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .msg .msg-text {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      word-break: break-word;
    }

    .system-msg {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      font-style: italic;
    }

    .chat-input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
    }
    #chat-input:focus { border-color: var(--accent); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      width: 38px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .users-list {
      padding: 0 14px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .user-pill {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--text);
    }
    .user-pill.me { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 640px) {
      .chat-panel { display: none; }
    }
  </style>
</head>
<body>

<div id="lobby">
  <div class="lobby-card">
    <div class="logo">⬡ PeerRoom</div>
    <h1>Jump in.<br/>No signup needed.</h1>
    <p>Instant video &amp; text chat powered by simple-peer.</p>

    <label for="name-input">Your name</label>
    <input id="name-input" type="text" placeholder="e.g. Alex" maxlength="30" autocomplete="off" />

    <label for="room-input">Room ID</label>
    <input id="room-input" type="text" placeholder="e.g. my-team" maxlength="40" autocomplete="off" />

    <button class="btn-join" onclick="joinRoom()">Enter Room →</button>
  </div>
</div>

<div id="app">
  <header class="app-header">
    <div class="logo">⬡ PeerRoom</div>
    <div class="room-tag" id="room-display"></div>
    <div class="header-spacer"></div>
    <div class="user-count"><span class="dot"></span> <span id="user-count-label">1 person</span></div>
  </header>

  <div class="main-layout">
    <div class="video-area">
      <div id="video-grid"></div>
      <div class="controls">
        <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()">📷</button>
        <button class="ctrl-btn leave" onclick="leaveRoom()">📞</button>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">💬 Chat</div>
      <div id="chat-messages"></div>
      <div style="border-top:1px solid var(--border); padding:10px 14px 0;">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">In room</div>
        <div class="users-list" id="users-list"></div>
      </div>
      <div class="chat-input-area">
        <input id="chat-input" type="text" placeholder="Say something…" onkeydown="if(event.key==='Enter') sendChat()" />
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getDatabase, ref, onValue, set, push, onDisconnect, remove, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAUA3bn3AoK_y2dEY64ipEzS8YGM-dy8T8",
    authDomain: "peerbase-chat.firebaseapp.com",
    databaseURL: "https://peerbase-chat-default-rtdb.firebaseio.com",
    projectId: "peerbase-chat",
    storageBucket: "peerbase-chat.firebasestorage.app",
    messagingSenderId: "342288819619",
    appId: "1:342288819619:web:0d93db02fadd31c51ce616"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let myName, myRoomId, myUserId, localStream;
  const peers = {};
  let micOn = true, camOn = true;

  window.joinRoom = async function() {
    const name = document.getElementById('name-input').value.trim();
    const roomId = document.getElementById('room-input').value.trim().replace(/\s+/g,'-').toLowerCase() || 'general';

    if (!name) { alert('Enter your name'); return; }

    myName = name;
    myRoomId = roomId;
    myUserId = Date.now() + '-' + Math.random().toString(36).slice(2,7);

    document.getElementById('lobby').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('room-display').textContent = '# ' + roomId;

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      addVideoTile('local', myName, localStream, true);
    } catch(e) {
      alert('Camera/mic access required!');
      return;
    }

    const roomRef = ref(db, `rooms/${myRoomId}/users/${myUserId}`);
    await set(roomRef, { name: myName, ts: Date.now() });
    onDisconnect(roomRef).remove();

    onValue(ref(db, `rooms/${myRoomId}/users`), snap => {
      const users = snap.val() || {};
      updateUserList(users);
      Object.keys(users).forEach(uid => {
        if (uid !== myUserId && !peers[uid]) initPeer(uid, users[uid].name);
      });
    });

    onChildAdded(ref(db, `rooms/${myRoomId}/signals/${myUserId}`), snap => {
      const sig = snap.val();
      if (sig.from !== myUserId && peers[sig.from]) {
        peers[sig.from].signal(JSON.parse(sig.data));
      }
      remove(snap.ref);
    });

    addSystemMsg('Joined #' + roomId);
  };

  function initPeer(uid, name) {
    const initiator = myUserId < uid;
    const peer = new SimplePeer({
      initiator,
      stream: localStream,
      trickle: false,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
        ]
      }
    });

    peers[uid] = peer;

    peer.on('signal', data => {
      push(ref(db, `rooms/${myRoomId}/signals/${uid}`), {
        from: myUserId,
        data: JSON.stringify(data)
      });
    });

    peer.on('stream', stream => {
      addVideoTile(uid, name, stream, false);
    });

    peer.on('error', err => console.error('Peer error:', err));
  }

  function addVideoTile(id, name, stream, isLocal) {
    const tid = 'tile-' + id;
    if (document.getElementById(tid)) return;

    const tile = document.createElement('div');
    tile.className = 'video-tile' + (isLocal ? ' local' : '');
    tile.id = tid;

    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.muted = isLocal;
    video.srcObject = stream;

    const label = document.createElement('div');
    label.className = 'tile-label';
    label.textContent = name;

    tile.append(video, label);
    document.getElementById('video-grid').append(tile);
  }

  window.toggleMic = () => {
    if (!localStream) return;
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    document.getElementById('btn-mic').textContent = micOn ? '🎙️' : '🔇';
    document.getElementById('btn-mic').classList.toggle('off', !micOn);
  };

  window.toggleCam = () => {
    if (!localStream) return;
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    document.getElementById('btn-cam').textContent = camOn ? '📷' : '🚫';
    document.getElementById('btn-cam').classList.toggle('off', !camOn);
  };

  window.leaveRoom = () => location.reload();

  window.sendChat = async () => {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    await push(ref(db, `rooms/${myRoomId}/chat`), { uid: myUserId, name: myName, msg, ts: Date.now() });
    addChatMsg(myName, msg, Date.now(), true);
    input.value = '';
  };

  function addChatMsg(name, text, ts, self) {
    const div = document.createElement('div');
    div.className = 'msg' + (self ? ' self' : '');
    div.innerHTML = `<div class="msg-meta"><span class="msg-name">${name}</span><span class="msg-time">${new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div><div class="msg-text">${text.replace(/</g,'&lt;')}</div>`;
    document.getElementById('chat-messages').append(div);
  }

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    document.getElementById('chat-messages').append(div);
  }

  function updateUserList(users) {
    const ul = document.getElementById('users-list');
    ul.innerHTML = '';
    Object.entries(users).forEach(([uid, u]) => {
      const pill = document.createElement('div');
      pill.className = 'user-pill' + (uid === myUserId ? ' me' : '');
      pill.textContent = u.name;
      ul.append(pill);
    });
    document.getElementById('user-count-label').textContent = Object.keys(users).length + ' people';
  }

  let chatInit = false;
  onValue(ref(db, `rooms/${myRoomId}/chat`), snap => {
    if (!chatInit) { chatInit = true; return; }
    const msgs = snap.val() || {};
    Object.values(msgs).slice(-1).forEach(m => {
      if (m.uid !== myUserId) addChatMsg(m.name, m.msg, m.ts, false);
    });
  });

  window.addEventListener('DOMContentLoaded', () => {
    const hash = location.hash.replace('#','').trim();
    if (hash) document.getElementById('room-input').value = hash;
  });
</script>
</body>
</html>
