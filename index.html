<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeerRoom — Instant Video Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d11;
      --surface: #13161d;
      --surface2: #1c2029;
      --border: #252a35;
      --accent: #00e5a0;
      --accent2: #0099ff;
      --danger: #ff4466;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 12px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }
    #lobby {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
      animation: fadeIn .4s ease;
    }
    .lobby-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 460px;
      max-width: 95vw;
      position: relative;
      overflow: hidden;
    }
    .lobby-card::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,229,160,.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .lobby-card::after {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(0,153,255,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }
    .lobby-card h1 {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .lobby-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    .btn-join {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: transform .15s, opacity .15s;
      margin-top: 4px;
    }
    .btn-join:hover { opacity: .88; transform: translateY(-1px); }
    .btn-join:active { transform: translateY(0); }
    #app {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    #app.visible { display: flex; }
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .app-header .logo { margin: 0; font-size: 12px; }
    .room-tag {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      color: var(--muted);
    }
    .header-spacer { flex: 1; }
    .user-count {
      font-size: 12px;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .video-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }
    #video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
      padding: 14px;
      overflow-y: auto;
      align-content: start;
    }
    .video-tile {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 16/9;
      animation: tileIn .3s ease;
    }
    @keyframes tileIn {
      from { opacity: 0; transform: scale(.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .video-tile video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-tile .tile-label {
      position: absolute;
      bottom: 10px; left: 12px;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }
    .video-tile.local { border-color: var(--accent); }
    .video-tile.local .tile-label::after { content: ' (you)'; color: var(--accent); }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .ctrl-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .15s;
    }
    .ctrl-btn:hover { background: var(--border); transform: scale(1.08); }
    .ctrl-btn.off { background: rgba(255,68,102,.15); border-color: var(--danger); color: var(--danger); }
    .ctrl-btn.leave { background: var(--danger); border-color: var(--danger); color: #fff; }
    .ctrl-btn.leave:hover { opacity: .85; }
    .chat-panel {
      width: 300px;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      animation: fadeIn .2s ease;
    }
    .msg.self {
      align-self: flex-end;
      background: rgba(0, 153, 255, 0.18);
      border: 1px solid rgba(0, 153, 255, 0.3);
    }
    .msg:not(.self) {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .msg .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .msg .msg-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
    }
    .msg.self .msg-name { color: var(--accent2); }
    .msg:not(.self) .msg-name { color: var(--accent); }
    .msg .msg-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.7;
    }
    .msg .msg-text {
      font-size: 14px;
      word-break: break-word;
    }
    .system-msg {
      align-self: center;
      max-width: 90%;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      background: rgba(107, 114, 128, 0.12);
      padding: 6px 12px;
      border-radius: 12px;
      margin: 8px 0;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .chat-input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      width: 38px;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover { opacity: .85; transform: scale(1.05); }
    .users-list {
      padding: 0 14px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .user-pill {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--text);
    }
    .user-pill.me { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 640px) {
      .chat-panel { display: none; }
    }
  </style>
</head>
<body>

  <div id="lobby">
    <div class="lobby-card">
      <div class="logo">⬡ PeerRoom</div>
      <h1>Jump in.<br/>No signup needed.</h1>
      <p>Instant video &amp; text chat. Share the room link with anyone to connect.</p>
      <label for="name-input">Your name</label>
      <input id="name-input" type="text" placeholder="e.g. Alex" maxlength="30" autocomplete="off" />
      <label for="room-input">Room ID</label>
      <input id="room-input" type="text" placeholder="e.g. my-team-standup" maxlength="40" autocomplete="off" />
      <button class="btn-join" onclick="joinRoom()">Enter Room →</button>
    </div>
  </div>

  <div id="app">
    <header class="app-header">
      <div class="logo">⬡ PeerRoom</div>
      <div class="room-tag" id="room-display"></div>
      <div class="header-spacer"></div>
      <div class="user-count"><span class="dot"></span> <span id="user-count-label">1 person</span></div>
    </header>
    <div class="main-layout">
      <div class="video-area">
        <div id="video-grid"></div>
        <div class="controls">
          <button class="ctrl-btn" id="btn-mic" title="Toggle mic" onclick="toggleMic()">🎙️</button>
          <button class="ctrl-btn" id="btn-cam" title="Toggle camera" onclick="toggleCam()">📷</button>
          <button class="ctrl-btn leave" title="Leave room" onclick="leaveRoom()">📞</button>
        </div>
      </div>
      <div class="chat-panel">
        <div class="chat-header">💬 Chat</div>
        <div id="chat-messages"></div>
        <div id="users-area" style="border-top:1px solid var(--border); padding:10px 14px 0;">
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">In room</div>
          <div class="users-list" id="users-list"></div>
        </div>
        <div class="chat-input-area">
          <input id="chat-input" type="text" placeholder="Say something…" maxlength="500"
                 onkeydown="if(event.key==='Enter') sendChat()" />
          <button class="send-btn" onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification sound for incoming messages -->
  <audio id="bloop-sound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0b5e6d0e0a.mp3?filename=bloop-01-116823.mp3" type="audio/mpeg">
  </audio>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getDatabase, ref, onValue, set, push, onDisconnect, onChildAdded, query, limitToLast } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAUA3bn3AoK_y2dEY64ipEzS8YGM-dy8T8",
    authDomain: "peerbase-chat.firebaseapp.com",
    databaseURL: "https://peerbase-chat-default-rtdb.firebaseio.com",
    projectId: "peerbase-chat",
    storageBucket: "peerbase-chat.firebasestorage.app",
    messagingSenderId: "342288819619",
    appId: "1:342288819619:web:0d93db02fadd31c51ce616"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const bloop = document.getElementById('bloop-sound');

  let myName = '';
  let myRoomId = '';
  let myUserId = '';

  window.joinRoom = async function() {
    const name = document.getElementById('name-input').value.trim();
    let roomId = document.getElementById('room-input').value.trim().replace(/\s+/g, '-').toLowerCase();
    if (!roomId) roomId = 'general';
    if (!name) {
      alert('Please enter your name.');
      return;
    }

    myName = name;
    myRoomId = roomId;
    myUserId = 'user-' + Date.now() + Math.random().toString(36).substring(2, 6);

    location.hash = roomId;
    document.getElementById('room-display').textContent = '# ' + roomId;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('app').classList.add('visible');

    addSystemMsg(`You joined #${roomId} as ${name}`);
    await joinFirebaseRoom();
  };

  async function joinFirebaseRoom() {
    const userRef = ref(db, `rooms/${myRoomId}/users/${myUserId}`);
    await set(userRef, { name: myName, joined: Date.now() });
    onDisconnect(userRef).remove();

    onValue(ref(db, `rooms/${myRoomId}/users`), (snap) => {
      const users = snap.val() || {};
      updateUserList(users);
    });

    const chatRef = ref(db, `rooms/${myRoomId}/chat`);
    const chatQuery = query(chatRef, limitToLast(100));

    onChildAdded(chatQuery, (snap) => {
      const msg = snap.val();
      if (msg) {
        const isSelf = msg.userId === myUserId;
        addChatMsg(msg.name, msg.message, msg.timestamp, isSelf);
      }
    });
  }

  window.sendChat = async function() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;

    const chatRef = ref(db, `rooms/${myRoomId}/chat`);
    await push(chatRef, {
      userId: myUserId,
      name: myName,
      message,
      timestamp: Date.now()
    });

    input.value = '';
  };

  function addChatMsg(name, text, timestamp, isSelf) {
    const container = document.getElementById('chat-messages');
    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const div = document.createElement('div');
    div.className = `msg${isSelf ? ' self' : ''}`;
    div.innerHTML = `
      <div class="msg-meta">
        <span class="msg-name">${escapeHtml(name)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${escapeHtml(text)}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;

    // Play sound only for incoming messages when tab is visible
    if (!isSelf && !document.hidden) {
      bloop.currentTime = 0;
      bloop.play().catch(() => {}); // silent fail if autoplay blocked
    }
  }

  function addSystemMsg(text) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function updateUserList(users) {
    const list = document.getElementById('users-list');
    list.innerHTML = '';
    const userArray = Object.entries(users).map(([id, data]) => ({ id, name: data.name, isMe: id === myUserId }));
    userArray.forEach(u => {
      const pill = document.createElement('div');
      pill.className = `user-pill${u.isMe ? ' me' : ''}`;
      pill.textContent = u.name;
      list.appendChild(pill);
    });
    const count = userArray.length;
    document.getElementById('user-count-label').textContent = count === 1 ? '1 person' : `${count} people`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  window.addEventListener('DOMContentLoaded', () => {
    const hash = location.hash.replace('#', '').trim();
    if (hash) document.getElementById('room-input').value = hash;
    document.getElementById('name-input').focus();
  });
</script>
</body>
</html>
