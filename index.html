<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeerRoom — Instant Video Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, onDisconnect, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    window.firebase = { initializeApp, getDatabase, ref, set, onValue, push, onDisconnect, remove, onChildAdded };
  </script>
  <!-- PeerJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05070d;
      --surface: #0f121a;
      --surface2: #1a1f2b;
      --border: #2a3345;
      --accent: #00ff9d;       /* vivid neon green */
      --accent2: #ff00aa;      /* hot neon magenta */
      --orange-glow: #ff6600;  /* electric orange */
      --cyan-glow: #00ffff;    /* electric cyan */
      --text: #f0f8ff;
      --muted: #a0b0c0;
      --radius: 12px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ──────────────────────────────────────────────
       Neon glow mix-in
    ────────────────────────────────────────────── */
    .neon-glow {
      box-shadow:
        0 0 4px  var(--cyan-glow),
        0 0 12px var(--cyan-glow),
        0 0 24px var(--orange-glow),
        0 0 36px rgba(255,102,0,0.5);
      text-shadow: 0 0 6px var(--orange-glow), 0 0 12px var(--cyan-glow);
    }

    .neon-glow-soft {
      box-shadow: 0 0 10px rgba(0,255,157,0.6), 0 0 20px rgba(255,102,0,0.4);
    }

    /* ──────────────────────────────────────────────
       Chat panel & messages – the main focus
    ────────────────────────────────────────────── */
    .chat-panel {
      width: 340px;
      min-width: 260px;
      max-width: 50%;
      border-left: 1px solid rgba(0,255,157,0.3);
      background: linear-gradient(180deg, #0f121a 0%, #0a0d14 100%);
      box-shadow: inset 0 0 30px rgba(0,255,157,0.08);
      position: relative;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(0,255,157,0.3);
      background: rgba(0,0,0,0.4);
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      position: relative;
    }

    .chat-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange-glow), transparent);
      box-shadow: 0 0 15px var(--orange-glow);
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      background: rgba(5,7,13,0.6);
    }

    #chat-messages::-webkit-scrollbar {
      width: 5px;
    }
    #chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    #chat-messages::-webkit-scrollbar-thumb {
      background: var(--cyan-glow);
      border-radius: 10px;
      box-shadow: 0 0 10px var(--cyan-glow);
    }

    .msg {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.45;
      animation: neonPulseIn 0.6s ease-out;
      position: relative;
      overflow: hidden;
    }

    .msg::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      pointer-events: none;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.08);
    }

    .msg.self {
      align-self: flex-end;
      background: linear-gradient(135deg, #00aaff88, #ff00aa66);
      border: 1px solid #00aaff;
      color: white;
      box-shadow:
        0 0 8px  #00aaff,
        0 0 16px #00aaff88,
        0 0 32px #ff00aa44;
    }

    .msg:not(.self) {
      align-self: flex-start;
      background: linear-gradient(135deg, #00ff9d88, #ffaa0066);
      border: 1px solid #00ff9d;
      color: white;
      box-shadow:
        0 0 8px  #00ff9d,
        0 0 16px #00ff9d88,
        0 0 32px #ff660044;
    }

    .msg .msg-meta {
      display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px;
    }

    .msg .msg-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 0 6px currentColor;
    }

    .msg.self .msg-name  { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
    .msg:not(.self) .msg-name { color: #ffdd00; text-shadow: 0 0 10px #ffdd00; }

    .msg .msg-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      opacity: 0.7;
    }

    .msg .msg-text {
      font-size: 14.5px;
      line-height: 1.5;
      text-shadow: 0 0 3px rgba(0,0,0,0.6);
    }

    .system-msg {
      align-self: center;
      max-width: 90%;
      text-align: center;
      font-size: 11.5px;
      color: #ff8800;
      font-style: italic;
      background: rgba(255,102,0,0.12);
      padding: 8px 14px;
      border-radius: 12px;
      margin: 10px 0;
      box-shadow: 0 0 20px rgba(255,102,0,0.4);
      animation: glowPulse 3s infinite alternate;
    }

    @keyframes neonPulseIn {
      from { opacity: 0; transform: scale(0.92); box-shadow: none; }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes glowPulse {
      from { box-shadow: 0 0 12px rgba(255,102,0,0.3); }
      to   { box-shadow: 0 0 28px rgba(255,102,0,0.7), 0 0 40px rgba(255,102,0,0.4); }
    }

    /* Chat input area neon */
    .chat-input-area {
      padding: 12px;
      border-top: 1px solid rgba(0,255,157,0.3);
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.4);
    }

    #chat-input {
      flex: 1;
      background: rgba(10,15,25,0.7);
      border: 1px solid #00ff9d44;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 0 10px rgba(0,255,157,0.12);
    }

    #chat-input:focus {
      border-color: var(--orange-glow);
      box-shadow:
        inset 0 0 10px var(--orange-glow),
        0 0 16px var(--orange-glow),
        0 0 30px rgba(255,102,0,0.5);
    }

    .send-btn {
      background: linear-gradient(135deg, #ff6600, #ff8800);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      box-shadow:
        0 0 12px #ff6600,
        0 0 24px #ff880088;
      transition: all 0.15s;
    }

    .send-btn:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 20px #ff6600,
        0 0 40px #ff8800cc;
    }

    .users-list {
      padding: 12px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: rgba(0,0,0,0.3);
    }

    .user-pill {
      font-size: 11.5px;
      background: rgba(0,255,157,0.12);
      border: 1px solid rgba(0,255,157,0.4);
      border-radius: 20px;
      padding: 4px 12px;
      color: white;
      box-shadow: 0 0 10px rgba(0,255,157,0.3);
      text-shadow: 0 0 4px currentColor;
    }

    .user-pill.me {
      background: rgba(255,102,0,0.25);
      border-color: var(--orange-glow);
      box-shadow: 0 0 14px var(--orange-glow);
    }

    /* Rest of your original styles remain unchanged below this line */
    .video-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    .controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    /* ... all other styles you had ... */

    @media (max-width: 768px) {
      .chat-panel { width: 100% !important; max-width: none; min-width: auto; }
      .resize-handle { display: none; }
    }
  </style>
</head>
<body>

<!-- HTML structure stays the same as your last working version -->

<div id="lobby">
  <div class="lobby-card">
    <div class="logo">⬡ PeerRoom</div>
    <h1>Jump in.<br/>No signup needed.</h1>
    <p>Instant video & text chat — now with neon stereo glow chat.</p>
    <label for="name-input">Your name</label>
    <input id="name-input" type="text" placeholder="e.g. Alex" maxlength="30" autocomplete="off" />
    <label for="room-input">Room ID</label>
    <input id="room-input" type="text" placeholder="e.g. my-team-standup" maxlength="40" autocomplete="off" />
    <button class="btn-join" onclick="joinRoom()">Enter Room →</button>
  </div>
</div>

<div id="app">
  <header class="app-header">
    <div class="logo">⬡ PeerRoom</div>
    <div class="room-tag" id="room-display"></div>
    <span class="peer-id-display">My Peer ID: <span id="my-peer-id">connecting...</span></span>
    <div class="header-spacer"></div>
    <input id="remote-peer-id" type="text" placeholder="Paste peer ID to call" />
    <button onclick="callPeer()">Call</button>
    <div class="user-count"><span class="dot"></span> <span id="user-count-label">1 person</span></div>
  </header>
  <div class="main-layout">
    <div class="video-area">
      <div id="video-grid"></div>
      <div class="controls">
        <button class="ctrl-btn" id="btn-mic" title="Toggle mic" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" id="btn-cam" title="Toggle camera" onclick="toggleCam()">📷</button>
        <button class="ctrl-btn leave" title="Leave room" onclick="leaveRoom()">📞</button>
      </div>
    </div>
    <div class="chat-panel">
      <div class="resize-handle" id="resize-handle"></div>
      <div class="chat-header">💬 Chat</div>
      <div id="chat-messages"></div>
      <div id="users-area" style="border-top:1px solid var(--border); padding:10px 14px 0;">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">In room</div>
        <div class="users-list" id="users-list"></div>
      </div>
      <div class="chat-input-area">
        <input id="chat-input" type="text" placeholder="Say something…" maxlength="500" onkeydown="if(event.key==='Enter') sendChat()" />
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase + PeerJS + resize logic + your existing functions go here (same as previous version) -->
<script type="module">
  // ... paste your entire previous <script type="module"> content here ...
  // including firebaseConfig, joinRoom, callPeer, sendChat, updateUserList, addChatMsg, etc.

  // Add this resize logic at the end of the script if not already present
  let isResizing = false;
  const resizeHandle = document.getElementById('resize-handle');
  const chatPanel = document.querySelector('.chat-panel');

  if (resizeHandle) {
    resizeHandle.addEventListener('mousedown', e => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      e.preventDefault();
    });
  }

  document.addEventListener('mousemove', e => {
    if (!isResizing) return;
    const dx = e.clientX;
    const mainRect = document.querySelector('.main-layout').getBoundingClientRect();
    let newWidth = mainRect.right - dx;
    newWidth = Math.max(240, Math.min(window.innerWidth * 0.55, newWidth));
    chatPanel.style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', () => {
    isResizing = false;
    document.body.style.cursor = '';
  });
</script>
</body>
</html>
