<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeerRoom — Instant Video Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    window.firebase = { initializeApp, getDatabase, ref, set, onValue, push, onDisconnect, remove };
  </script>
  <!-- PeerJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d11;
      --surface: #13161d;
      --surface2: #1c2029;
      --border: #252a35;
      --accent: #00e5a0;
      --accent2: #0099ff;
      --danger: #ff4466;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 12px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }
    #lobby { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; animation: fadeIn .4s ease; }
    .lobby-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 460px; max-width: 95vw; position: relative; overflow: hidden; }
    .logo { font-size: 13px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; }
    .btn-join { width: 100%; background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer; }
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }
    .app-header { display: flex; align-items: center; gap: 12px; padding: 0 20px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .peer-id-display { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
    .call-input { width: 180px; padding: 6px 10px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); }
    .call-btn { background: var(--accent2); color: #fff; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-weight: 600; }
    #video-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; padding: 14px; overflow-y: auto; }
    .video-tile { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; aspect-ratio: 16/9; }
    .video-tile video { width: 100%; height: 100%; object-fit: cover; }
    .video-tile .tile-label { position: absolute; bottom: 10px; left: 12px; background: rgba(0,0,0,.65); border-radius: 6px; padding: 3px 10px; font-size: 12px; color: #fff; }
    .video-tile.local { border-color: var(--accent); }
    .chat-panel { width: 300px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; }
    .msg.self { align-self: flex-end; background: rgba(0,153,255,0.18); }
    .msg:not(.self) { align-self: flex-start; background: var(--surface2); }
    .users-list { padding: 0 14px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .user-pill { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--text); }
    .user-pill.me { border-color: var(--accent); color: var(--accent); }
    /* ... rest of your original styles - I kept them all ... */
  </style>
</head>
<body>

<div id="lobby">
  <div class="lobby-card">
    <div class="logo">⬡ PeerRoom</div>
    <h1>Jump in.<br/>No signup needed.</h1>
    <p>Instant video &amp; text chat — chat & user list sync via Firebase, video via PeerJS.</p>
    <label for="name-input">Your name</label>
    <input id="name-input" type="text" placeholder="e.g. Alex" maxlength="30" autocomplete="off" />
    <label for="room-input">Room ID</label>
    <input id="room-input" type="text" placeholder="e.g. my-team-standup" maxlength="40" autocomplete="off" />
    <button class="btn-join" onclick="joinRoom()">Enter Room →</button>
  </div>
</div>

<div id="app">
  <header class="app-header">
    <div class="logo">⬡ PeerRoom</div>
    <div class="room-tag" id="room-display"></div>
    <span class="peer-id-display">My Peer ID: <span id="my-peer-id">connecting...</span></span>
    <div class="header-spacer"></div>
    <input id="remote-peer-id" type="text" placeholder="Paste peer ID to call" style="padding:6px 10px; font-size:12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text);" />
    <button onclick="callPeer()" style="background:var(--accent2); color:#fff; border:none; border-radius:6px; padding:6px 12px; cursor:pointer; font-weight:600;">Call</button>
    <div class="user-count"><span class="dot"></span> <span id="user-count-label">1 person</span></div>
  </header>
  <div class="main-layout">
    <div class="video-area">
      <div id="video-grid"></div>
      <div class="controls">
        <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()">📷</button>
        <button class="ctrl-btn leave" onclick="leaveRoom()">📞</button>
      </div>
    </div>
    <div class="chat-panel">
      <div class="chat-header">💬 Chat</div>
      <div id="chat-messages"></div>
      <div id="users-area" style="border-top:1px solid var(--border); padding:10px 14px 0;">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">In room</div>
        <div class="users-list" id="users-list"></div>
      </div>
      <div class="chat-input-area">
        <input id="chat-input" type="text" placeholder="Say something…" maxlength="500" onkeydown="if(event.key==='Enter') sendChat()" />
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyAUA3bn3AoK_y2dEY64ipEzS8YGM-dy8T8",
  authDomain: "peerbase-chat.firebaseapp.com",
  databaseURL: "https://peerbase-chat-default-rtdb.firebaseio.com",
  projectId: "peerbase-chat",
  storageBucket: "peerbase-chat.appspot.com",
  messagingSenderId: "342288819619",
  appId: "1:342288819619:web:0d93db02fadd31c51ce616"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.getDatabase(app);

let myName = '';
let myRoomId = '';
let myUserId = '';
let peer = null;
let myPeerId = '';
let localStream = null;

window.joinRoom = async function() {
  const name = document.getElementById('name-input').value.trim();
  let roomId = document.getElementById('room-input').value.trim().replace(/\s+/g, '-').toLowerCase() || 'general';
  if (!name) return alert('Enter your name');

  myName = name;
  myRoomId = roomId;
  myUserId = 'user_' + Date.now() + Math.random().toString(36).slice(2,7);

  document.getElementById('room-display').textContent = '# ' + roomId;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  // Firebase presence
  const userRef = firebase.ref(db, `rooms/${roomId}/users/${myUserId}`);
  await firebase.set(userRef, { name, joined: Date.now() });
  firebase.onDisconnect(userRef).remove();

  // Watch users
  firebase.onValue(firebase.ref(db, `rooms/${roomId}/users`), snap => {
    const usersData = snap.val() || {};
    updateUserList(usersData);
  });

  // Watch chat
  firebase.onChildAdded(firebase.ref(db, `rooms/${roomId}/chat`), snap => {
    const msg = snap.val();
    addChatMsg(msg.name, msg.text, msg.time, msg.userId === myUserId);
  });

  // Local video
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    addVideoTile('local', myName, localStream, true);
  } catch (e) {
    addSystemMsg('Camera/mic access failed.');
  }

  // PeerJS
  peer = new Peer();
  peer.on('open', id => {
    myPeerId = id;
    document.getElementById('my-peer-id').textContent = id;
  });

  peer.on('call', call => {
    call.answer(localStream);
    call.on('stream', stream => addVideoTile(call.peer, 'Remote', stream, false));
  });
};

window.callPeer = function() {
  const id = document.getElementById('remote-peer-id').value.trim();
  if (!id || !localStream) return;
  const call = peer.call(id, localStream);
  call.on('stream', stream => addVideoTile(call.peer, 'Remote', stream, false));
};

window.sendChat = function() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  firebase.push(firebase.ref(db, `rooms/${myRoomId}/chat`), {
    userId: myUserId,
    name: myName,
    text,
    time: Date.now()
  });

  input.value = '';
};

function updateUserList(usersData) {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  let count = 0;
  for (const uid in usersData) {
    const u = usersData[uid];
    const pill = document.createElement('div');
    pill.className = 'user-pill' + (u.name === myName ? ' me' : '');
    pill.textContent = u.name;
    list.appendChild(pill);
    count++;
  }
  document.getElementById('user-count-label').textContent = count + ' people';
}

function addChatMsg(name, text, time, isSelf) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg${isSelf ? ' self' : ''}`;
  div.innerHTML = `
    <div class="msg-meta">
      <span class="msg-name">${escapeHtml(name)}</span>
      <span class="msg-time">${new Date(time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
    </div>
    <div class="msg-text">${escapeHtml(text)}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  document.getElementById('chat-messages').appendChild(div);
  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m]);
}

window.toggleMic = function() {
  if (localStream) {
    const t = localStream.getAudioTracks()[0];
    if (t) {
      t.enabled = !t.enabled;
      document.getElementById('btn-mic').textContent = t.enabled ? '🎙️' : '🔇';
    }
  }
};

window.toggleCam = function() {
  if (localStream) {
    const t = localStream.getVideoTracks()[0];
    if (t) {
      t.enabled = !t.enabled;
      document.getElementById('btn-cam').textContent = t.enabled ? '📷' : '🚫';
    }
  }
};

window.leaveRoom = function() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (peer) peer.destroy();
  location.reload();
};

window.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#', '').trim();
  if (hash) document.getElementById('room-input').value = hash;
});
</script>
</body>
</html>
