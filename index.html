<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeerBase — Instant Video Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- LiveKit Client SDK -->
  <script src="https://unpkg.com/livekit-client@2/dist/livekit-client.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d11;
      --surface: #13161d;
      --surface2: #1c2029;
      --border: #252a35;
      --accent: #00e5a0;
      --accent2: #0099ff;
      --danger: #ff4466;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 12px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }
    #lobby {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
    }
    .lobby-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 460px;
      max-width: 95vw;
    }
    .logo { color: var(--accent); font-weight: 700; font-size: 1.4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.2rem; margin-bottom: 1rem; }
    label { display: block; margin: 1rem 0 0.4rem; font-weight: 700; color: var(--muted); }
    input[type="text"] {
      width: 100%;
      padding: 0.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }
    .btn-join {
      margin-top: 1.5rem;
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }
    .app-header {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
    }
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .video-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: black;
    }
    #video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 8px;
      padding: 16px;
      overflow-y: auto;
    }
    .video-tile {
      position: relative;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }
    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .tile-label {
      position: absolute;
      bottom: 8px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .controls {
      padding: 16px;
      background: var(--surface);
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }
    .ctrl-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
    }
    .ctrl-btn.leave { background: #ff4444; }
    .chat-panel {
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 16px;
      background: var(--surface2);
      font-weight: bold;
      border-bottom: 1px solid var(--border);
    }
    #chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
    }
    .msg.self {
      align-self: flex-end;
      background: var(--accent);
      color: black;
    }
    .msg.other {
      align-self: flex-start;
      background: #333;
    }
    .chat-input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      padding: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
    }
    .send-btn {
      padding: 10px 16px;
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="lobby">
  <div class="lobby-card">
    <div class="logo">PeerBase</div>
    <h1>Jump in.<br/>No signup needed.</h1>
    <p>Instant video + chat room.</p>

    <label for="name-input">Your name</label>
    <input id="name-input" type="text" placeholder="e.g. Harley" maxlength="30" autocomplete="off" />

    <label for="room-input">Room name</label>
    <input id="room-input" type="text" placeholder="e.g. friends-hangout" maxlength="40" autocomplete="off" />

    <button class="btn-join" onclick="joinRoom()">Enter Room →</button>
  </div>
</div>

<div id="app">
  <header class="app-header">
    <div class="logo">PeerBase</div>
    <div class="room-tag" id="room-display"></div>
    <div style="flex:1"></div>
    <div class="user-count"><span class="dot"></span> <span id="user-count-label">1 person</span></div>
  </header>

  <div class="main-layout">
    <div class="video-area">
      <div id="video-grid"></div>
      <div class="controls">
        <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()">📷</button>
        <button class="ctrl-btn leave" onclick="leaveRoom()">📞</button>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">Chat</div>
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <input id="chat-input" type="text" placeholder="Say something…" maxlength="500" onkeydown="if(event.key==='Enter') sendChat()" />
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
const LIVEKIT_URL = 'wss://peerbase-4ton8j78.livekit.cloud';

// ──────────────────────────────────────────────
//  REPLACE THESE TWO VALUES WITH YOUR REAL API KEY & SECRET
//  (get them from LiveKit Cloud → API Keys)
// ──────────────────────────────────────────────
const API_KEY    = 'API67Qh46mCxz4k';
const API_SECRET = 'Docxl2JTucHraF78fez7Dab3oPCBdJ36f7xXULQPiabA';

// ──────────────────────────────────────────────

let room = null;
let localVideoTrack = null;
let localAudioTrack = null;
let myIdentity = null;

function generateToken(roomName, participantName) {
  const at = new LiveKit.AccessToken(API_KEY, API_SECRET, {
    identity: participantName
  });

  at.addGrant({
    roomJoin: true,
    room: roomName,
    canPublish: true,
    canSubscribe: true
  });

  return at.toJwt();
}

window.joinRoom = async function() {
  const name = document.getElementById('name-input').value.trim();
  const roomName = document.getElementById('room-input').value.trim() || 'test-room';

  if (!name) {
    alert('Please enter your name');
    return;
  }

  myIdentity = name;
  document.getElementById('room-display').textContent = roomName;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Generate token
  const token = generateToken(roomName, name);

  // Connect to room
  room = new LiveKit.Room();

  room.on(LiveKit.RoomEvent.ParticipantConnected, participant => {
    addSystemMsg(`${participant.identity} joined the room`);
    updateUserCount();
  });

  room.on(LiveKit.RoomEvent.ParticipantDisconnected, participant => {
    addSystemMsg(`${participant.identity} left the room`);
    updateUserCount();
  });

  room.on(LiveKit.RoomEvent.TrackSubscribed, (track, pub, participant) => {
    if (track.kind === 'video') {
      addRemoteVideo(track, participant);
    }
  });

  try {
    await room.connect(LIVEKIT_URL, token);
    console.log('Connected to room:', room.name);

    // Publish local camera + mic
    const tracks = await LiveKit.createLocalTracks({
      video: { facingMode: 'user' },
      audio: true
    });

    tracks.forEach(track => {
      room.localParticipant.publishTrack(track);
      if (track.kind === 'video') {
        localVideoTrack = track;
        addLocalVideo(track);
      } else if (track.kind === 'audio') {
        localAudioTrack = track;
      }
    });

  } catch (err) {
    console.error('Failed to connect:', err);
    alert('Could not connect to room: ' + err.message);
  }
};

function addLocalVideo(track) {
  const el = track.attach();
  el.muted = true;
  const tile = createVideoTile(el, myIdentity + ' (you)', true);
  document.getElementById('video-grid').appendChild(tile);
}

function addRemoteVideo(track, participant) {
  const el = track.attach();
  const tile = createVideoTile(el, participant.identity);
  document.getElementById('video-grid').appendChild(tile);

  // Clean up when track unsubscribed
  track.on('unsubscribed', () => {
    tile.remove();
  });
}

function createVideoTile(videoEl, labelText, isLocal = false) {
  const tile = document.createElement('div');
  tile.className = 'video-tile' + (isLocal ? ' local' : '');
  tile.appendChild(videoEl);

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.textContent = labelText;
  tile.appendChild(label);

  return tile;
}

function updateUserCount() {
  const count = room.remoteParticipants.size + 1; // + local
  document.getElementById('user-count-label').textContent = count + (count === 1 ? ' person' : ' people');
}

function addSystemMsg(text) {
  const msg = document.createElement('div');
  msg.className = 'system-msg';
  msg.textContent = text;
  document.getElementById('chat-messages').appendChild(msg);
  msg.scrollIntoView({ behavior: 'smooth' });
}

window.toggleMic = function() {
  if (localAudioTrack) {
    localAudioTrack.setEnabled(!localAudioTrack.isEnabled);
  }
};

window.toggleCam = function() {
  if (localVideoTrack) {
    localVideoTrack.setEnabled(!localVideoTrack.isEnabled);
  }
};

window.leaveRoom = function() {
  if (room) {
    room.disconnect();
    room = null;
  }
  location.reload();
};

// Basic chat (you can replace with Firebase or LiveKit data channels later)
window.sendChat = function() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  const msg = document.createElement('div');
  msg.className = 'msg self';
  msg.innerHTML = `<div class="msg-text">${escapeHtml(text)}</div>`;
  document.getElementById('chat-messages').appendChild(msg);
  msg.scrollIntoView({ behavior: 'smooth' });

  input.value = '';
};

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'})[m]);
}
</script>
</body>
</html>
